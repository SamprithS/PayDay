# ===== APP =====
spring.application.name=payday

# ===== DATABASE =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/payday}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== SERVER =====
server.port=8080

# ===== CORS =====
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===== JWT =====
jwt.secret=${JWT_SECRET:changeme_generate_a_real_secret_before_deploying}
jwt.expiration-ms=2592000000

# ===== GOOGLE OAUTH =====
google.client-id=${GOOGLE_CLIENT_ID:645995475573-547s4s97i88qbb8e3o7gi7e53442nqa5.apps.googleusercontent.com}

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== LOGGING =====
logging.level.com.app.payday=DEBUG

# ===== LOCAL PROFILE =====
spring.profiles.active=local